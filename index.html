<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HAX TV — Now Streaming</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #060109;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ---------- stage: preserves the 1402:1122 aspect ratio of the monitor image ---------- */
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: calc(100vh * (1402 / 1122));
    max-height: calc(100vw * (1122 / 1402));
  }

  /* ---------- the monitor frame image fills the stage ---------- */
  #monitor {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
    pointer-events: none;
  }

  /* ---------- ticker strip
     Positioned to sit inside the lower portion of the monitor screen.
     In the 1402x1122 image the screen runs x: 72-1339, y: 150-800.
     The bottom bar is roughly the bottom 10% of the screen area (y ~720-800).
     As percentages of the image dimensions:
       left:   72/1402  = 5.1%
       right:  (1402-1339)/1402 = 4.5%  →  width = 90.4%
       top:    720/1122 = 64.2%
       height: 80/1122  = 7.1%
  ---------- */
  #ticker-wrap {
    position: absolute;
    left:   5.1%;
    top:    64.2%;
    width:  90.4%;
    height: 7.1%;
    overflow: hidden;
    display: flex;
    align-items: center;
    /* subtle dark-glass tint to make text legible over the very dark screen */
    background: rgba(6, 1, 20, 0.55);
    border-top: 1px solid rgba(180, 80, 255, 0.35);
    border-bottom: 1px solid rgba(180, 80, 255, 0.35);
  }

  #ticker-track {
    display: flex;
    white-space: nowrap;
    animation: scroll-left 22s linear infinite;
    will-change: transform;
  }

  /* The track contains two copies of the text so the loop is seamless */
  .ticker-segment {
    display: inline-flex;
    align-items: center;
    gap: 0;
  }

  .ticker-text {
    font-family: 'Segoe UI', 'Arial', sans-serif;
    font-size: clamp(13px, 1.8vh, 22px);
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #ffffff;
    padding: 0 3em;
  }

  .ticker-text .label {
    color: #d8b4fe;
    margin-right: 0.4em;
  }

  .ticker-text .title {
    color: #ffffff;
    font-style: italic;
  }

  /* divider diamond between repetitions */
  .ticker-div {
    color: #a855f7;
    font-size: clamp(10px, 1.4vh, 18px);
    padding: 0 1.5em;
    opacity: 0.7;
  }

  @keyframes scroll-left {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
</style>
</head>
